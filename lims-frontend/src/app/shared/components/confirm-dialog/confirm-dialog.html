@if (isOpen) {
  <div class="fixed inset-0 bg-theme-sidebar/50 backdrop-blur-sm flex items-center justify-center z-[1000] px-4" (click)="onCancel()">
    <div class="p-6 max-w-sm w-full bg-theme-card dark:bg-theme-sidebar rounded-2xl shadow-xl border border-theme-border dark:border-theme-border" (click)="$event.stopPropagation()">
      <h3 class="text-xl font-bold mb-2 text-text-primary dark:text-white">{{ title }}</h3>
      <p class="text-sm text-text-secondary dark:text-text-secondary mb-6 leading-relaxed">{{ message }}</p>
      <div class="flex gap-3 justify-end items-center">
        <button class="px-5 py-2.5 rounded-xl text-sm font-semibold text-text-primary dark:text-slate-300 hover:bg-theme-bg dark:hover:bg-slate-800 transition-colors" (click)="onCancel()">Cancel</button>
        <button class="px-5 py-2.5 rounded-xl text-sm font-semibold text-white bg-error hover:bg-red-700 transition-colors shadow-sm shadow-red-600/20" (click)="onConfirm()">{{ confirmText }}</button>
      </div>
    </div>
  </div>
}
