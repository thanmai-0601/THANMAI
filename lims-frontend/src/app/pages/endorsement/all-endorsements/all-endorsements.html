<div class="flex items-center gap-4 mb-8">
    <a routerLink="/app/dashboard/admin" 
       class="flex items-center justify-center text-2xl text-text-secondary hover:text-primary transition-all rounded-full hover:bg-theme-bg dark:hover:bg-slate-800 p-1 active:scale-90" title="Back to Dashboard">
        &larr;
    </a>
    <h1 class="text-3xl font-extrabold text-text-primary dark:text-white tracking-tight">All System Endorsements</h1>
</div>

<app-loading-spinner *ngIf="loading"></app-loading-spinner>
<div *ngIf="!loading">
    <div
        class="bg-theme-card dark:bg-theme-sidebar rounded-2xl shadow-sm border border-theme-border dark:border-theme-border overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse whitespace-nowrap">
                <thead>
                    <tr
                        class="bg-theme-bg dark:bg-slate-800/50 text-text-secondary dark:text-text-secondary text-xs text-center uppercase tracking-wider">
                        <th class="px-6 py-4 font-semibold border-b border-theme-border dark:border-theme-border">Date</th>
                        <th class="px-6 py-4 font-semibold border-b border-theme-border dark:border-theme-border">Policy No.
                        </th>
                        <th class="px-6 py-4 font-semibold border-b border-theme-border dark:border-theme-border">Customer
                        </th>
                        <th class="px-6 py-4 font-semibold border-b border-theme-border dark:border-theme-border">Type</th>
                        <th class="px-6 py-4 font-semibold border-b border-theme-border dark:border-theme-border">Status</th>
                        <th class="px-6 py-4 border-b border-theme-border dark:border-theme-border">Action</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-theme-border dark:divide-slate-800 text-center">
                    <tr *ngFor="let e of endorsements"
                        class="hover:bg-theme-bg/50 dark:hover:bg-slate-800/20 transition-colors group">
                        <td class="px-6 py-4 text-sm text-text-secondary dark:text-slate-300">{{ e.requestedAt |
                            date:'shortDate' }}</td>
                        <td class="px-6 py-4 text-sm text-primary dark:text-accent">{{ e.policyNumber }}</td>
                        <td class="px-6 py-4 text-sm text-text-primary dark:text-white">{{ e.customerName }}</td>
                        <td class="px-6 py-4 text-sm font-semibold text-text-primary dark:text-white">{{ e.type
                            }}</td>
                        <td class="px-6 py-4"><app-status-badge [status]="e.status"></app-status-badge></td>
                        <td class="px-6 py-4 text-right">
                            <a [routerLink]="['/app/endorsement', e.endorsementId]"
                                class="inline-flex items-center justify-center px-4 py-2 rounded-lg bg-theme-bg dark:bg-slate-800 text-text-primary dark:text-slate-300 font-semibold text-xs hover:bg-slate-200 hover:text-text-primary transition-colors">View Details</a>
                        </td>
                    </tr>
                    <tr *ngIf="endorsements.length === 0">
                        <td colspan="6" class="px-6 py-12 text-center text-text-secondary font-medium border-0">No
                            endorsements in the system.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
