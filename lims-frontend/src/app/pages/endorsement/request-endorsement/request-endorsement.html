<div class="max-w-2xl mx-auto">
    <div class="mb-8">
        <h1 class="text-3xl font-extrabold text-text-primary dark:text-white tracking-tight">Request Policy Change</h1>
        <p class="text-text-secondary dark:text-text-secondary mt-2">Submit a request to update your policy details.
        </p>
    </div>

    <div
        class="bg-theme-card dark:bg-theme-sidebar rounded-3xl p-8 shadow-sm border border-theme-border dark:border-theme-border">
        <form [formGroup]="endorsementForm" (ngSubmit)="step === 1 ? nextStep() : submit()" class="flex flex-col gap-6">

            <div *ngIf="step === 1" class="flex flex-col gap-6">
                <div class="flex flex-col gap-2">
                    <label class="text-sm font-semibold text-text-primary dark:text-slate-300 ml-1">Select
                        Policy</label>
                    <select formControlName="policyId" [disabled]="fetchingPolicies"
                        class="w-full px-4 py-3.5 rounded-xl bg-theme-bg dark:bg-slate-800 border border-theme-border dark:border-slate-700 text-text-primary dark:text-white focus:ring-2 focus:ring-blue-500 outline-none transition-all disabled:opacity-50">
                        <option value="" disabled selected>-- Select a Policy --</option>
                        <option *ngFor="let p of policies" [value]="p.policyId">{{ p.planName }} ({{ p.policyNumber }})
                        </option>
                    </select>
                    <p *ngIf="!fetchingPolicies && policies.length === 0" class="text-xs text-error mt-1 ml-1">No
                        active
                        policies found.</p>
                </div>

                <div class="flex flex-col gap-2">
                    <label class="text-sm font-semibold text-text-primary dark:text-slate-300 ml-1">Type of
                        Change</label>
                    <select formControlName="endorsementType"
                        class="w-full px-4 py-3.5 rounded-xl bg-theme-bg dark:bg-slate-800 border border-theme-border dark:border-slate-700 text-text-primary dark:text-white focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                        <option value="" disabled selected>-- Select Type --</option>
                        <option value="NomineeUpdate">Update Nominee</option>
                        <option value="AddressChange">Change Address</option>
                    </select>
                </div>

                <button type="submit"
                    class="mt-4 w-full py-4 rounded-xl font-bold text-white bg-primary hover:bg-primary-hover disabled:opacity-60 transition-all shadow-lg shadow-primary/20 hover:-translate-y-0.5">
                    Next
                </button>
            </div>

            <div *ngIf="step === 2" class="flex flex-col gap-6">

                <!-- Address Change -->
                <div *ngIf="endorsementForm.get('endorsementType')?.value === 'AddressChange'"
                    class="flex flex-col gap-4">
                    <div>
                        <label class="text-sm font-semibold text-text-primary dark:text-slate-300 ml-1">New
                            Address</label>
                        <textarea formControlName="newAddress" rows="4" placeholder="Enter the complete new address..."
                            class="w-full mt-2 px-4 py-3.5 rounded-xl bg-theme-bg dark:bg-slate-800 border border-theme-border dark:border-slate-700 text-text-primary dark:text-white focus:ring-2 focus:ring-blue-500 outline-none transition-all resize-none"></textarea>
                    </div>
                </div>

                <!-- Nominee Update -->
                <div *ngIf="endorsementForm.get('endorsementType')?.value === 'NomineeUpdate'"
                    class="flex flex-col gap-4">
                    <h3 class="text-sm font-bold text-text-secondary uppercase tracking-wide">New Nominee Details</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="text-sm font-semibold text-text-primary dark:text-slate-300 ml-1">Full
                                Name</label>
                            <input type="text" formControlName="nomineeName"
                                class="w-full mt-2 px-4 py-3.5 rounded-xl bg-theme-bg dark:bg-slate-800 border border-theme-border dark:border-slate-700 text-text-primary dark:text-white focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                        </div>
                        <div>
                            <label
                                class="text-sm font-semibold text-text-primary dark:text-slate-300 ml-1">Relationship</label>
                            <input type="text" formControlName="nomineeRelationship"
                                class="w-full mt-2 px-4 py-3.5 rounded-xl bg-theme-bg dark:bg-slate-800 border border-theme-border dark:border-slate-700 text-text-primary dark:text-white focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                        </div>
                        <div>
                            <label class="text-sm font-semibold text-text-primary dark:text-slate-300 ml-1">Age</label>
                            <input type="number" formControlName="nomineeAge"
                                class="w-full mt-2 px-4 py-3.5 rounded-xl bg-theme-bg dark:bg-slate-800 border border-theme-border dark:border-slate-700 text-text-primary dark:text-white focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                        </div>
                        <div>
                            <label class="text-sm font-semibold text-text-primary dark:text-slate-300 ml-1">Contact
                                Number</label>
                            <input type="text" formControlName="nomineeContact"
                                class="w-full mt-2 px-4 py-3.5 rounded-xl bg-theme-bg dark:bg-slate-800 border border-theme-border dark:border-slate-700 text-text-primary dark:text-white focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                        </div>
                    </div>
                </div>

                <div class="flex gap-4 mt-4">
                    <button type="button" (click)="previousStep()"
                        class="w-1/3 py-4 rounded-xl font-bold text-text-primary bg-theme-bg hover:bg-slate-200 dark:text-slate-300 dark:bg-slate-800 dark:hover:bg-slate-700 transition-all">
                        Back
                    </button>
                    <button type="submit" [disabled]="loading"
                        class="w-2/3 py-4 rounded-xl font-bold text-white bg-primary hover:bg-primary-hover disabled:opacity-60 transition-all shadow-lg shadow-primary/20 hover:-translate-y-0.5">
                        {{ loading ? 'Submitting...' : 'Submit Request' }}
                    </button>
                </div>
            </div>
        </form>
    </div>
</div>
