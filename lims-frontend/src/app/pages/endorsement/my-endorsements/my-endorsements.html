<div class="max-w-7xl mx-auto pt-8 transition-all duration-500 animate-in fade-in slide-in-from-bottom-8">
    <div class="flex flex-col md:flex-row justify-between items-start md:items-end gap-6 mb-12">
        <div>
            <div class="flex items-center gap-3 mb-2 opacity-90">
                <span class="text-[10px] font-black uppercase tracking-[0.2em] text-text-secondary">My Dashboard</span>
                <div class="h-px w-8 bg-text-secondary opacity-70"></div>
            </div>
            <div class="flex items-center gap-4">
                <a [routerLink]="dashboardRoute" 
                    class="w-10 h-10 flex items-center justify-center rounded-xl bg-theme-bg dark:bg-slate-800 border border-theme-border/20 hover:border-primary/50 text-text-secondary hover:text-primary transition-all shadow-sm">
                    <app-icon name="arrow-left" className="w-5 h-5"></app-icon>
                </a>
                <h1 class="text-4xl md:text-5xl font-black text-text-primary dark:text-white tracking-tightest">
                    My <span class="text-gradient">Endorsements</span>
                </h1>
            </div>
            <p class="text-xs font-bold text-text-secondary uppercase tracking-[0.2em] opacity-80 mt-2 ml-14">Track your requested policy changes</p>
        </div>
        <div class="flex gap-4">
            <a routerLink="/app/endorsement/request"
                class="btn-premium px-6 h-12 rounded-2xl text-[10px] font-black uppercase tracking-widest flex items-center gap-2 shadow-xl shadow-primary/20">
                <app-icon name="plus"></app-icon> New Request
            </a>
        </div>
    </div>

<app-loading-spinner *ngIf="loading"></app-loading-spinner>

<div *ngIf="!loading">
    <div
        class="bg-theme-card dark:bg-theme-sidebar rounded-3xl shadow-sm border border-theme-border dark:border-theme-border overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse whitespace-nowrap">
                <thead>
                    <tr
                        class="bg-theme-bg dark:bg-slate-800/50 text-text-secondary dark:text-text-secondary text-xs text-center uppercase tracking-wider">
                        <th class="px-6 py-4 font-semibold border-b border-theme-border dark:border-theme-border">Date</th>
                        <th class="px-6 py-4 font-semibold border-b border-theme-border dark:border-theme-border">Policy No.
                        </th>
                        <th class="px-6 py-4 font-semibold border-b border-theme-border dark:border-theme-border">Type</th>
                        <th class="px-6 py-4 font-semibold border-b border-theme-border dark:border-theme-border">Status</th>
                        <th class="px-6 py-4 border-b border-theme-border dark:border-theme-border"></th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-theme-border dark:divide-slate-800 text-center">
                    <tr *ngFor="let e of endorsements"
                        class="hover:bg-theme-bg/50 dark:hover:bg-slate-800/20 transition-colors group">
                        <td class="px-6 py-4 text-sm text-text-secondary dark:text-slate-300">{{ e.requestedAt |
                            date:'shortDate' }}</td>
                        <td class="px-6 py-4 text-sm text-primary dark:text-accent"><a
                                [routerLink]="['/app/policy', e.policyNumber]" class="hover:underline">{{ e.policyNumber
                                }}</a></td>
                        <td class="px-6 py-4 text-sm font-semibold text-text-primary dark:text-white">{{ e.type
                            }}</td>
                        <td class="px-6 py-4"><app-status-badge [status]="e.status"></app-status-badge></td>
                        <td class="px-6 py-4 text-right">
                            <a [routerLink]="['/app/endorsement', e.endorsementId]"
                                class="inline-flex items-center justify-center px-4 py-2 rounded-lg bg-primary/5 dark:bg-blue-900/20 text-primary dark:text-accent font-semibold text-xs hover:bg-primary hover:text-white transition-colors">Details</a>
                        </td>
                    </tr>
                    <tr *ngIf="endorsements.length === 0">
                        <td colspan="5" class="px-6 py-12 text-center text-text-secondary font-medium border-0">No
                            endorsements found.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</div>
