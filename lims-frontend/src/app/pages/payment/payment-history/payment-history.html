<div class="flex items-center gap-3 mb-8">
    <button routerLink=".."
        class="p-2 text-text-secondary hover:text-text-secondary dark:hover:text-slate-200 transition-colors rounded-lg hover:bg-theme-bg dark:hover:bg-slate-800">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18">
            </path>
        </svg>
    </button>
    <h1 class="text-3xl font-extrabold text-text-primary dark:text-white tracking-tight">Payment History</h1>
</div>

<app-loading-spinner *ngIf="loading"></app-loading-spinner>
<div *ngIf="!loading">
    <div
        class="bg-theme-card dark:bg-theme-sidebar rounded-2xl shadow-sm border border-theme-border dark:border-theme-border overflow-hidden mb-6">
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse whitespace-nowrap">
                <thead>
                    <tr
                        class="bg-theme-bg dark:bg-slate-800/50 text-text-secondary dark:text-text-secondary text-xs text-center uppercase tracking-wider">
                        <th class="px-6 py-4 font-semibold border-b border-theme-border dark:border-theme-border">Date
                            Paid
                        </th>
                        <th class="px-6 py-4 font-semibold border-b border-theme-border dark:border-theme-border">
                            Invoice Ref
                        </th>
                        <th class="px-6 py-4 font-semibold border-b border-theme-border dark:border-theme-border">Method
                        </th>
                        <th class="px-6 py-4 font-semibold border-b border-theme-border dark:border-theme-border">Amount
                            (₹)
                        </th>
                        <th class="px-6 py-4 font-semibold border-b border-theme-border dark:border-theme-border">Status
                        </th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-theme-border dark:divide-slate-800 text-center">
                    <tr *ngFor="let p of payments; trackBy: trackByPaymentId"
                        class="hover:bg-theme-bg/50 dark:hover:bg-slate-800/20 transition-colors">
                        <td class="px-6 py-4 text-sm font-semibold text-text-primary dark:text-white">{{ p.paymentDate |
                            date:'mediumDate' }}</td>
                        <td class="px-6 py-4 text-sm text-text-secondary dark:text-text-secondary">{{
                            p.transactionReference ||
                            'N/A' }}</td>
                        <td class="px-6 py-4 text-sm font-semibold text-text-secondary dark:text-slate-300">{{
                            p.paymentMethod }}</td>
                        <td class="px-6 py-4 text-sm font-bold text-text-primary dark:text-white">{{ p.amountPaid |
                            currency:'INR':'symbol' }}</td>
                        <td class="px-6 py-4">
                            <app-status-badge [status]="p.status" />
                        </td>
                    </tr>
                    <tr *ngIf="payments.length === 0">
                        <td colspan="5" class="px-6 py-12 text-center text-text-secondary font-medium border-0">No
                            payment
                            history found for this policy.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
