<div
    class="min-h-screen flex items-center justify-center bg-theme-bg dark:bg-theme-sidebar p-6 selection:bg-blue-200 dark:selection:bg-blue-900 transition-colors duration-300">
    <!-- Decorative background elements -->
    <div
        class="fixed top-0 left-1/2 -translate-x-1/2 w-[800px] h-[400px] bg-primary/10 dark:bg-primary/10 blur-[120px] rounded-full pointer-events-none">
    </div>

    <div
        class="w-full max-w-md bg-theme-card dark:bg-theme-sidebar rounded-[2rem] p-8 md:p-10 shadow-2xl shadow-blue-900/5 border border-theme-border dark:border-theme-border relative z-10">
        <div class="text-center mb-10">
            <a routerLink="/"
                class="inline-flex items-center gap-2 text-2xl font-extrabold text-primary dark:text-primary tracking-tight mb-6 hover:opacity-80 transition-opacity">
                <span class="text-3xl">🏦</span> NexaLife
            </a>
            <h1 class="text-2xl font-bold text-text-primary dark:text-white mb-2">Reset Password</h1>
            <p class="text-sm text-text-secondary dark:text-text-secondary">Enter your email and a new password to reset your
                account.</p>
        </div>

        <form (ngSubmit)="onSubmit()" class="flex flex-col gap-5">
            <div class="flex flex-col gap-1.5">
                <label class="text-sm font-semibold text-text-primary dark:text-slate-300 ml-1">Email Address</label>
                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-text-secondary dark:text-text-secondary"></span>
                    <input type="email" name="email" [(ngModel)]="form.email" required placeholder="you@example.com"
                        class="w-full pl-11 pr-4 py-3.5 rounded-xl bg-theme-bg dark:bg-slate-800 border border-theme-border dark:border-slate-700 text-text-primary dark:text-white placeholder-slate-400 dark:placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all">
                </div>
            </div>

            <div class="flex flex-col gap-1.5">
                <label class="text-sm font-semibold text-text-primary dark:text-slate-300 ml-1">New Password</label>
                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-text-secondary dark:text-text-secondary"></span>
                    <input type="password" name="newPassword" [(ngModel)]="form.newPassword" required
                        placeholder="••••••••"
                        class="w-full pl-11 pr-4 py-3.5 rounded-xl bg-theme-bg dark:bg-slate-800 border border-theme-border dark:border-slate-700 text-text-primary dark:text-white placeholder-slate-400 dark:placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all">
                </div>
            </div>

            <button type="submit" [disabled]="loading"
                class="mt-4 w-full py-4 rounded-xl font-bold text-white bg-primary hover:bg-primary-hover disabled:opacity-60 disabled:cursor-not-allowed shadow-lg shadow-primary/20 hover:-translate-y-0.5 transition-all">
                {{ loading ? 'Resetting...' : 'Reset Password' }}
            </button>
        </form>

        <div class="mt-8 text-center border-t border-theme-border dark:border-theme-border/60 pt-6">
            <p class="text-sm text-text-secondary dark:text-text-secondary">
                Remember your password?
                <a routerLink="/login"
                    class="font-bold text-primary dark:text-primary hover:text-primary-hover dark:hover:text-accent transition-colors">Sign
                    in here</a>
            </p>
        </div>
    </div>
</div>
