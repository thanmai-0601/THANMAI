<div class="max-w-md mx-auto">
  <h1 class="text-2xl font-bold text-text-primary dark:text-white mb-6">Change Password</h1>
  
  <div class="bg-theme-card dark:bg-theme-sidebar rounded-2xl p-6 shadow-sm border border-theme-border dark:border-theme-border">
    <form (ngSubmit)="onSubmit()" class="flex flex-col gap-5">
      <div class="flex flex-col gap-1.5">
        <label class="text-sm font-semibold text-text-primary dark:text-slate-300">Current Password</label>
        <input type="password" name="current" [(ngModel)]="form.currentPassword" required 
          class="w-full px-4 py-2.5 rounded-xl bg-theme-bg dark:bg-slate-800 border border-theme-border dark:border-slate-700 text-text-primary dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>

      <div class="flex flex-col gap-1.5">
        <label class="text-sm font-semibold text-text-primary dark:text-slate-300">New Password</label>
        <input type="password" name="new" [(ngModel)]="form.newPassword" required 
          class="w-full px-4 py-2.5 rounded-xl bg-theme-bg dark:bg-slate-800 border border-theme-border dark:border-slate-700 text-text-primary dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>

      <div class="flex flex-col gap-1.5">
        <label class="text-sm font-semibold text-text-primary dark:text-slate-300">Confirm New Password</label>
        <input type="password" name="confirm" [(ngModel)]="confirmPassword" required 
          class="w-full px-4 py-2.5 rounded-xl bg-theme-bg dark:bg-slate-800 border border-theme-border dark:border-slate-700 text-text-primary dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>

      <button type="submit" [disabled]="loading"
        class="mt-2 w-full py-3 rounded-xl font-bold text-white bg-primary hover:bg-primary-hover disabled:opacity-60 transition-colors">
        {{ loading ? 'Updating...' : 'Update Password' }}
      </button>
    </form>
  </div>
</div>
